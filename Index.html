<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Web Linux Replica</title>
<style>
  :root {
    --wallpaper: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    --taskbar-bg: rgba(20, 20, 20, 0.92);
    --window-bg: #2a2a2a;
    --titlebar-bg: #3a3a3a;
    --titlebar-active: #4a4a4a;
    --accent: #4f46e5;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Segoe UI', system-ui, sans-serif; 
    background: #000; color: #e0e0e0; 
    overflow: hidden; user-select: none; 
    height: 100dvh; touch-action: manipulation;
  }

  /* Boot Screen */
  #boot-screen { position: fixed; inset: 0; background: #0a0a0a; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s; }
  .boot-logo { font-size: clamp(48px, 10vw, 72px); margin-bottom: 20px; animation: pulse 2s infinite; }
  .boot-output { width: min(90%, 500px); font-family: 'Consolas', monospace; font-size: clamp(12px, 2.5vw, 13px); color: #0f0; line-height: 1.7; height: 180px; overflow: hidden; }
  .boot-bar { width: min(80%, 300px); height: 4px; background: #222; border-radius: 4px; margin-top: 30px; overflow: hidden; }
  .boot-bar-inner { height: 100%; background: var(--accent); animation: bootProgress 2.8s ease forwards; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes bootProgress { to { width: 100%; } }

  /* Desktop */
  #desktop { 
    position: absolute; inset: 0; background: var(--wallpaper); background-size: cover; 
    padding: 20px 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); 
    gap: 18px; align-content: start; overflow-y: auto;
  }

  .desktop-icon { 
    width: 88px; text-align: center; cursor: pointer; padding: 8px; border-radius: 12px; 
    transition: all 0.2s ease;
  }
  .desktop-icon:hover { background: rgba(255,255,255,0.15); transform: scale(1.08); }
  .desktop-icon:active { transform: scale(0.92); }
  .desktop-icon-img { font-size: clamp(36px, 7vw, 48px); margin-bottom: 6px; }
  .desktop-icon-text { font-size: 13px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-weight: 500; }

  .window { 
    position: absolute; background: var(--window-bg); border-radius: var(--radius); 
    box-shadow: 0 12px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; 
    min-width: 260px; min-height: 180px; max-width: 96vw; max-height: calc(100dvh - 70px);
    animation: windowOpen 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes windowOpen { from { opacity: 0; transform: scale(0.92) translateY(15px); } to { opacity: 1; transform: scale(1) translateY(0); } }

  .titlebar { height: 42px; background: var(--titlebar-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .titlebar-buttons button { width: 14px; height: 14px; border-radius: 50%; border: none; cursor: pointer; }
  .tb-btn.minimize { background: #f1c40f; }
  .tb-btn.maximize { background: #2ecc71; }
  .tb-btn.close { background: #e74c3c; }

  .window-content { flex: 1; overflow: auto; padding: 10px; }

  #taskbar { 
    position: fixed; bottom: 0; left: 0; right: 0; height: 56px; 
    background: var(--taskbar-bg); backdrop-filter: blur(20px); 
    display: flex; align-items: center; padding: 0 8px; z-index: 9999; gap: 6px;
  }
  .start-btn { width: 50px; height: 50px; font-size: 28px; border-radius: 12px; cursor: pointer; }
  .taskbar-apps { display: flex; gap: 4px; flex: 1; overflow-x: auto; }

  #start-menu { 
    position: fixed; bottom: 64px; left: 12px; 
    width: min(520px, 94vw); height: min(520px, 82vh); 
    background: rgba(28,28,28,0.97); backdrop-filter: blur(24px); 
    border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); 
    display: none; flex-direction: column; padding: 20px; z-index: 9998;
  }
  #start-menu.open { display: flex; }
</style>
</head>
<body>

<div id="boot-screen">
  <div class="boot-logo">🐧</div>
  <div class="boot-output" id="boot-output"></div>
  <div class="boot-bar"><div class="boot-bar-inner"></div></div>
</div>

<div id="desktop"></div>
<div id="windows-container"></div>

<div id="taskbar">
  <div class="start-btn" id="start-btn">🐧</div>
  <div class="taskbar-apps" id="taskbar-windows"></div>
  <span class="clock" id="clock">00:00</span>
</div>

<div id="start-menu">
  <div style="margin-bottom:20px;display:flex;align-items:center;gap:14px">
    <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(#4f46e5,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:28px">👤</div>
    <div><div style="font-weight:600">User</div><div style="font-size:13px;opacity:0.7">user@weblinux.local</div></div>
  </div>
  <div class="start-apps" id="start-apps" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;flex:1"></div>
</div>

<script>
let zIndex = 100;
const windows = [];

class WindowFrame {
  constructor(title, contentHTML) {
    this.element = document.createElement('div');
    this.element.className = 'window';
    this.element.style.left = (60 + Math.random()*100) + 'px';
    this.element.style.top = (50 + Math.random()*80) + 'px';
    this.element.innerHTML = `
      <div class="titlebar">
        <div style="font-weight:500">${title}</div>
        <div style="display:flex;gap:8px">
          <button class="tb-btn minimize">−</button>
          <button class="tb-btn maximize">□</button>
          <button class="tb-btn close">×</button>
        </div>
      </div>
      <div class="window-content">${contentHTML}</div>
    `;
    document.getElementById('windows-container').appendChild(this.element);
    this.makeDraggable();
    this.addButtons();
    this.focus();
  }
  makeDraggable() {
    const titlebar = this.element.querySelector('.titlebar');
    let isDragging = false, x, y;
    titlebar.addEventListener('mousedown', e => {
      if (e.target.tagName === 'BUTTON') return;
      isDragging = true;
      x = e.clientX - this.element.offsetLeft;
      y = e.clientY - this.element.offsetTop;
      this.focus();
    });
    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      this.element.style.left = (e.clientX - x) + 'px';
      this.element.style.top = (e.clientY - y) + 'px';
    });
    document.addEventListener('mouseup', () => isDragging = false);
  }
  addButtons() {
    this.element.querySelector('.close').onclick = () => this.element.remove();
    this.element.querySelector('.minimize').onclick = () => this.element.style.opacity = 0.3;
    this.element.querySelector('.maximize').onclick = () => this.element.classList.toggle('maximized');
  }
  focus() {
    this.element.style.zIndex = ++zIndex;
  }
}

// Apps
function launchApp(name, content) {
  new WindowFrame(name, content);
}

// Desktop Icons
function initDesktop() {
  const appsList = [
    {name: "Terminal", icon: "🖥️", content: "<h3>Terminal</h3><p>Type <code>help</code> to begin.</p>"},
    {name: "Files", icon: "📁", content: "<h3>File Manager</h3><p>Responsive File Explorer</p>"},
    {name: "Editor", icon: "📝", content: "<textarea style='width:100%;height:300px;background:#1e1e1e;color:#ddd;padding:10px'>Welcome to Web Linux!</textarea>"},
    {name: "Calculator", icon: "🧮", content: "<h2 style='text-align:center'>🧮 Calculator</h2>"},
    {name: "Browser", icon: "🌐", content: "<h3>Web Browser</h3><p>Simulated browser</p>"}
  ];

  const desktop = document.getElementById('desktop');
  appsList.forEach(app => {
    const div = document.createElement('div');
    div.className = 'desktop-icon';
    div.innerHTML = `<div class="desktop-icon-img">\( {app.icon}</div><div class="desktop-icon-text"> \){app.name}</div>`;
    div.onclick = () => launchApp(app.name, app.content);
    desktop.appendChild(div);
  });
}

// Start Menu
function initStartMenu() {
  const container = document.getElementById('start-apps');
  const apps = ["Terminal", "Files", "Editor", "Calculator", "Browser"];
  apps.forEach(name => {
    const el = document.createElement('div');
    el.style.textAlign = "center";
    el.style.cursor = "pointer";
    el.innerHTML = `<div style="font-size:42px;margin-bottom:6px">📦</div><div>${name}</div>`;
    el.onclick = () => {
      launchApp(name, `<h3>${name}</h3><p>App launched successfully.</p>`);
      document.getElementById('start-menu').classList.remove('open');
    };
    container.appendChild(el);
  });
}

// Boot
function boot() {
  const output = document.getElementById('boot-output');
  const messages = [
    "[ OK ] Initializing kernel...",
    "[ OK ] Mounting filesystem...",
    "[ OK ] Starting desktop environment...",
    "[ OK ] Web Linux Replica v1.1 ready."
  ];
  let i = 0;
  const int = setInterval(() => {
    output.innerHTML += messages[i] + "<br>";
    i++;
    if (i >= messages.length) {
      clearInterval(int);
      setTimeout(() => {
        document.getElementById('boot-screen').style.opacity = "0";
        setTimeout(() => {
          document.getElementById('boot-screen').style.display = "none";
          initDesktop();
          initStartMenu();
        }, 600);
      }, 800);
    }
  }, 280);
}

// Event Listeners
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-menu').classList.toggle('open');
  });

  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }, 1000);

  boot();
});
</script>
</body>
</html>
